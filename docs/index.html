<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HDFS HA 과제 리더보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      background: #0b1020; color: #e6edf3;
      padding: 32px 24px;
    }
    h1 { font-size: 1.35rem; font-weight: 800; margin-bottom: 4px; }
    .meta { color: #94a3b8; font-size: 0.78rem; margin-bottom: 24px; }
    .board {
      width: 100%;
      max-width: 1120px;
      overflow-x: auto;
      background: #101827;
      border: 1px solid #334155;
      border-radius: 6px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 980px;
    }
    thead { background: #172033; }
    th {
      padding: 10px 14px;
      text-align: center;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #cbd5e1;
      font-weight: 600;
    }
    th.pname-head { text-align: left; }
    td {
      padding: 0;
      border-top: 1px solid #1f2a44;
      vertical-align: middle;
    }
    td.rank {
      width: 48px; text-align: center;
      font-size: 0.8rem; color: #94a3b8;
      padding: 12px 8px;
    }
    td.pname {
      padding: 12px 16px;
      font-size: 0.9rem; font-weight: 600;
      white-space: nowrap;
    }
    td.total {
      text-align: center; padding: 12px 10px;
      font-size: 1.05rem; font-weight: 800; color: #60a5fa;
    }
    .of { color: #94a3b8; font-size: 0.78rem; font-weight: 400; }
    td.penalty {
      text-align: center; padding: 12px 14px;
      font-size: 0.85rem; color: #f8fafc;
    }
    td.sc {
      width: 72px; text-align: center;
      padding: 10px 4px;
    }
    td.sc.pass { background: #14532d; }
    td.sc.fail { background: #7f1d1d; }
    td.sc.none { background: #101827; }
    .verdict { display: block; font-size: 0.82rem; font-weight: 800; line-height: 1.15; }
    .ms { display: block; font-size: 0.68rem; color: #dbeafe; margin-top: 3px; }
    .dash { color: #64748b; }
    tr.top3 td.pname { color: #facc15; }
    tr:hover td { background: #1e293b; }
    tr:hover td.sc.pass { background: #166534; }
    tr:hover td.sc.fail { background: #991b1b; }
    .empty { text-align: center; color: #94a3b8; padding: 48px; font-size: 0.9rem; }
    .sc-head { width: 72px; }
  </style>
</head>
<body>
  <h1>HDFS HA 과제 리더보드</h1>
  <p class="meta">업데이트: 2026-04-28 13:52 KST &nbsp;·&nbsp; 1명 참여 &nbsp;·&nbsp; AC/WA와 성공 시나리오 실행 시간 합산</p>
  <div class="board">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th class="pname-head">이름</th>
          <th class="sc-head">1</th>
<th class="sc-head">2</th>
<th class="sc-head">3</th>
<th class="sc-head">4</th>
<th class="sc-head">5</th>
<th class="sc-head">6</th>
<th class="sc-head">7</th>
<th class="sc-head">8</th>
<th class="sc-head">9</th>
          <th>통과</th>
          <th>Penalty</th>
        </tr>
      </thead>
      <tbody>
<tr class="top3">
  <td class="rank">1</td>
  <td class="pname">🥇 지호</td>
  <td class="sc pass"><span class="verdict">AC</span><span class="ms">53.2s</span></td><td class="sc pass"><span class="verdict">AC</span><span class="ms">52.0s</span></td><td class="sc pass"><span class="verdict">AC</span><span class="ms">40.0s</span></td><td class="sc pass"><span class="verdict">AC</span><span class="ms">36.5s</span></td><td class="sc pass"><span class="verdict">AC</span><span class="ms">25.0s</span></td><td class="sc pass"><span class="verdict">AC</span><span class="ms">24.9s</span></td><td class="sc pass"><span class="verdict">AC</span><span class="ms">39.3s</span></td><td class="sc pass"><span class="verdict">AC</span><span class="ms">58.1s</span></td><td class="sc pass"><span class="verdict">AC</span><span class="ms">1:00</span></td>
  <td class="total">9<span class="of">/9</span></td>
  <td class="penalty">6:29</td>
</tr>
      </tbody>
    </table>
  </div>
</body>
</html>
