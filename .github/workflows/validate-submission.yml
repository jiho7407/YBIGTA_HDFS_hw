name: Validate Submission

on:
  pull_request:
    branches: [main]
    paths:
      - "submissions/**"

permissions:
  contents: read

jobs:
  validate:
    name: 제출물 검증
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 제출 변경 범위 확인
        id: find-name
        run: |
          mapfile -t CHANGED_FILES < <(git diff --name-only "origin/${{ github.base_ref }}...HEAD")

          if [[ "${#CHANGED_FILES[@]}" -eq 0 ]]; then
            echo "변경된 파일이 없습니다."
            exit 1
          fi

          INVALID_FILES=()
          for path in "${CHANGED_FILES[@]}"; do
            if [[ ! "${path}" =~ ^submissions/[^/]+/result\.json$ ]]; then
              INVALID_FILES+=("${path}")
            fi
          done

          if [[ "${#INVALID_FILES[@]}" -gt 0 ]]; then
            echo "제출 PR에는 submissions/<이름>/result.json 하나만 포함해야 합니다."
            printf '허용되지 않는 파일: %s\n' "${INVALID_FILES[@]}"
            exit 1
          fi

          NAME=$(printf '%s\n' "${CHANGED_FILES[@]}" \
            | awk -F/ '{print $2}' \
            | sort -u)

          COUNT=$(echo "${NAME}" | grep -c '\S' || true)
          if [[ "${COUNT}" -ne 1 ]]; then
            echo "하나의 submissions/<이름>/ 폴더만 변경해야 합니다. 감지된 폴더: ${NAME}"
            exit 1
          fi

          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"
          echo "제출자: ${NAME}"

      - name: result.json 검증
        run: |
          NAME="${{ steps.find-name.outputs.name }}"
          python3 scripts/validate_submission_result.py "submissions/${NAME}/result.json"
