name: Validate Submission

on:
  pull_request:
    branches: [main]
    paths:
      - "submissions/**"

permissions:
  contents: read

jobs:
  validate:
    name: 제출물 검증
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 변경된 제출자 폴더 찾기
        id: find-name
        run: |
          NAME=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD \
            | grep '^submissions/' \
            | awk -F/ '{print $2}' \
            | sort -u)

          COUNT=$(echo "${NAME}" | grep -c '\S' || true)
          if [[ "${COUNT}" -ne 1 ]]; then
            echo "하나의 submissions/<이름>/ 폴더만 변경해야 합니다. 감지된 폴더: ${NAME}"
            exit 1
          fi

          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"
          echo "제출자: ${NAME}"

      - name: result.json 검증
        run: |
          NAME="${{ steps.find-name.outputs.name }}"
          python3 scripts/validate_submission_result.py "submissions/${NAME}/result.json"
