name: Generate Leaderboard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "submissions/**"
      - "scripts/generate_leaderboard.py"
      - ".github/workflows/generate-leaderboard.yml"

permissions:
  contents: write

jobs:
  leaderboard:
    name: 리더보드 생성
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 리더보드 HTML 생성
        run: python3 scripts/generate_leaderboard.py

      - name: GitHub Pages 파일 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "변경 없음, 배포 건너뜀"
          else
            git commit -m "chore: update leaderboard"
            git push
          fi
